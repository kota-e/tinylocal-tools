                - paragraph [ref=e520]: TinyLocal Tools is a local-first browser app for cleaning, protecting, and sharing text. It is a small open-source MVP with three practical tools in one static web app.
                - paragraph [ref=e521]: It helps people who copy text from PDFs, websites, emails, documents, AI tools, support tickets, GitHub issues, and notes.
